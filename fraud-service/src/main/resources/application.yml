server:
  port: ${FRAUD_SERVICE_PORT}

spring:
  application:
    name: fraud-service

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS}
    consumer:
      group-id: fraud-service
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.finguard.dto"
        spring.json.value.default.type: com.finguard.dto.TransactionEvent
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

kafka:
  topics:
    transactions: transactions
    fraud-alerts: fraud-alerts

services:
  risk:
    url: ${RISK_SERVICE_URL}
  rag:
    url: ${RAG_SERVICE_URL}
  transaction:
    url: ${TRANSACTION_SERVICE_URL:http://localhost:8081}

fraud:
  thresholds:
    high-amount: ${FRAUD_HIGH_AMOUNT:10000.0}
    velocity-window-seconds: ${FRAUD_VELOCITY_WINDOW:3600}
    velocity-max-count: ${FRAUD_VELOCITY_MAX:10}
    score-flag: ${FRAUD_SCORE_FLAG:0.7}
    score-block: ${FRAUD_SCORE_BLOCK:0.9}
services:
  # ── Infrastructure ──────────────────────────────────────────────
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    ports:
      - "${ZOOKEEPER_PORT}:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_PORT}

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    depends_on: [zookeeper]
    ports:
      - "${KAFKA_PORT}:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:${ZOOKEEPER_PORT}
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:${KAFKA_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    depends_on: [kafka]
    ports:
      - "${KAFKA_UI_PORT}:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ${KAFKA_CLUSTER_NAME}
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: ${KAFKA_BOOTSTRAP_SERVERS}

  postgres:
    image: postgres:15-alpine
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init.sql:/docker-entrypoint-initdb.d/init.sql

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT}:6379"

  chromadb:
    image: chromadb/chroma:0.4.24
    ports:
      - "${CHROMA_PORT}:8000"
    volumes:
      - chromadata:/chroma/chroma

  # ── Auth Service ────────────────────────────────────────────────
  auth-service:
    build: ./auth-service
    ports:
      - "${AUTH_SERVICE_PORT}:8086"
    depends_on: [postgres, redis]
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      JWT_SECRET: ${JWT_SECRET}

  # ── API Gateway ────────────────────────────────────────────────
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on: [auth-service]
    env_file:
      - .env
    environment:
      JWT_SECRET: ${JWT_SECRET}

  # ── Transaction Service ─────────────────────────────────────────
  transaction-service:
    build: ./transaction-service
    ports:
      - "${TRANSACTION_SERVICE_PORT}:8081"
    depends_on: [kafka, postgres]
    env_file:
      - .env
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}

  # ── Fraud Service ───────────────────────────────────────────────
  fraud-service:
    build: ./fraud-service
    ports:
      - "${FRAUD_SERVICE_PORT}:8082"
    depends_on: [kafka, postgres, redis]
    env_file:
      - .env
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      RISK_SERVICE_URL: ${RISK_SERVICE_URL}
      RAG_SERVICE_URL: ${RAG_SERVICE_URL}

  # ── Risk Service ────────────────────────────────────────────────
  risk-service:
    build: ./risk-service
    ports:
      - "${RISK_SERVICE_PORT}:8083"
    depends_on: [postgres, redis]
    env_file:
      - .env
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}

  # ── RAG Service ─────────────────────────────────────────────────
  rag-service:
    build: ./rag-service
    ports:
      - "${RAG_SERVICE_PORT}:8084"
    depends_on: [chromadb]
    env_file:
      - .env
    environment:
      CHROMA_HOST: chromadb
      CHROMA_PORT: ${CHROMA_PORT}
      OPENAI_API_KEY: ${OPENAI_API_KEY}

  # ── Notification Service ────────────────────────────────────────
  notification-service:
    build: ./notification-service
    ports:
      - "${NOTIFICATION_SERVICE_PORT}:8085"
    depends_on: [kafka]
    env_file:
      - .env
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_BOOTSTRAP_SERVERS}
      MAIL_USERNAME: ${MAIL_USERNAME}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      ALERT_EMAIL: ${ALERT_EMAIL}

volumes:
  pgdata:
  chromadata:
server:
  port: ${GATEWAY_PORT:8080}

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods: ["GET","POST","PUT","PATCH","DELETE","OPTIONS"]
            allowedHeaders: "*"

      routes:
        # ── PUBLIC: auth endpoints bypass JWT filter ──────────────
        - id: auth-public
          uri: http://auth-service:${AUTH_SERVICE_PORT}
          predicates:
            - Path=/api/auth/register,/api/auth/login,/api/auth/refresh

        # ── PROTECTED: logout and user profile ───────────────────
        - id: auth-protected
          uri: http://auth-service:${AUTH_SERVICE_PORT}
          predicates:
            - Path=/api/auth/logout,/api/users/**
          filters:
            - name: JwtAuthGatewayFilter

        # ── Transaction service ───────────────────────────────────
        - id: transaction-service
          uri: http://transaction-service:${TRANSACTION_SERVICE_PORT}
          predicates:
            - Path=/api/transactions/**
          filters:
            - name: JwtAuthGatewayFilter

        # ── Fraud service ─────────────────────────────────────────
        - id: fraud-service
          uri: http://fraud-service:${FRAUD_SERVICE_PORT}
          predicates:
            - Path=/api/fraud/**
          filters:
            - name: JwtAuthGatewayFilter

        # ── Risk service ──────────────────────────────────────────
        - id: risk-service
          uri: http://risk-service:${RISK_SERVICE_PORT}
          predicates:
            - Path=/api/risk/**
          filters:
            - name: JwtAuthGatewayFilter

        # ── RAG service ───────────────────────────────────────────
        - id: rag-service
          uri: http://rag-service:${RAG_SERVICE_PORT}
          predicates:
            - Path=/api/rag/**
          filters:
            - name: JwtAuthGatewayFilter

        # ── Notification service ──────────────────────────────────
        - id: notification-service
          uri: http://notification-service:${NOTIFICATION_SERVICE_PORT}
          predicates:
            - Path=/api/notifications/**
          filters:
            - name: JwtAuthGatewayFilter

jwt:
  secret: ${JWT_SECRET}

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway
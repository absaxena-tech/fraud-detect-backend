server:
  port: ${RAG_SERVICE_PORT}

spring:
  application:
    name: rag-service

chroma:
  host: ${CHROMA_HOST:chromadb}
  port: ${CHROMA_PORT}
  collection: fraud-cases

openai:
  api-key: ${OPENAI_API_KEY}
  model: gpt-3.5-turbo
  embedding-model: text-embedding-ada-002

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics